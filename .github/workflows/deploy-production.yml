name: Deploy production

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  backend:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    name: Deploy backend
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Validate backend deployment configuration
        shell: bash
        env:
          APP_ORIGIN: ${{ vars.APP_ORIGIN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
          DUMMY_PASSWORD_HASH: ${{ secrets.DUMMY_PASSWORD_HASH }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          missing=0
          for name in APP_ORIGIN AWS_REGION AWS_ROLE_ARN DATABASE_URL DIRECT_DATABASE_URL DUMMY_PASSWORD_HASH R2_ACCOUNT_ID R2_BUCKET_NAME R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing GitHub deployment value: ${name}"
              missing=1
            fi
          done
          exit "$missing"
      - uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - run: npm ci
      - name: Apply database migrations
        run: npm run prisma:migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
      - run: npm run sam:build
      - name: Deploy Lambda and API Gateway
        run: >-
          sam deploy
          --stack-name appifylab-api-production
          --region "${{ secrets.AWS_REGION }}"
          --resolve-s3
          --capabilities CAPABILITY_IAM
          --no-confirm-changeset
          --no-fail-on-empty-changeset
          --parameter-overrides
          Stage=production
          AppOrigin="${{ vars.APP_ORIGIN }}"
          DatabaseUrl="${{ secrets.DATABASE_URL }}"
          DummyPasswordHash="${{ secrets.DUMMY_PASSWORD_HASH }}"
          R2AccountId="${{ secrets.R2_ACCOUNT_ID }}"
          R2BucketName="${{ secrets.R2_BUCKET_NAME }}"
          R2AccessKeyId="${{ secrets.R2_ACCESS_KEY_ID }}"
          R2SecretAccessKey="${{ secrets.R2_SECRET_ACCESS_KEY }}"

  frontend:
    name: Deploy frontend
    needs: backend
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Validate frontend deployment configuration
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_PUBLIC_URL: ${{ vars.R2_PUBLIC_URL }}
        run: |
          missing=0
          for name in CLOUDFLARE_API_TOKEN R2_ACCOUNT_ID R2_PUBLIC_URL; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing GitHub deployment value: ${name}"
              missing=1
            fi
          done
          exit "$missing"
      - run: npm ci
      - run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          NEXT_PUBLIC_R2_PUBLIC_URL: ${{ vars.R2_PUBLIC_URL }}
