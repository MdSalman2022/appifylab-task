name: Deploy production

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  backend:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    name: Deploy backend
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - run: npm ci
      - name: Apply database migrations
        run: npm run prisma:migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
      - run: npm run sam:build
      - name: Deploy Lambda and API Gateway
        run: >-
          sam deploy
          --stack-name appifylab-api-production
          --region "${{ vars.AWS_REGION }}"
          --resolve-s3
          --capabilities CAPABILITY_IAM
          --no-confirm-changeset
          --no-fail-on-empty-changeset
          --parameter-overrides
          Stage=production
          AppOrigin="${{ vars.APP_ORIGIN }}"
          DatabaseUrl="${{ secrets.DATABASE_URL }}"
          DummyPasswordHash="${{ secrets.DUMMY_PASSWORD_HASH }}"
          R2AccountId="${{ vars.R2_ACCOUNT_ID }}"
          R2BucketName="${{ vars.R2_BUCKET_NAME }}"
          R2AccessKeyId="${{ secrets.R2_ACCESS_KEY_ID }}"
          R2SecretAccessKey="${{ secrets.R2_SECRET_ACCESS_KEY }}"

  frontend:
    name: Deploy frontend
    needs: backend
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID }}
          NEXT_PUBLIC_R2_PUBLIC_URL: ${{ vars.R2_PUBLIC_URL }}
